<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FallSense – Alerts</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Fraunces:wght@700;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/css/dashboard.css" />
    <link rel="stylesheet" href="assets/css/alerts.css" />
    <link rel="stylesheet" href="assets/css/medication-reminder.css" />
  </head>
  <body class="alerts-page">
    <header class="top-bar">
      <a class="navbar-brand" href="index.html">
        <img
          class="brand-logo"
          src="assets/logo.png"
          alt="FallSense – Elderly Monitor"
          onerror="
            this.style.display = 'none';
            this.nextElementSibling.style.display = 'block';
          "
        />
        <span class="brand-text" style="display: none">FallSense</span>
      </a>
      <div class="top-bar-actions">
        <button
          type="button"
          class="btn-nav-menu"
          id="navMenuOpen"
          aria-expanded="false"
          aria-controls="navModal"
        >
          <svg viewBox="0 0 24 24">
            <line x1="3" y1="6" x2="21" y2="6" />
            <line x1="3" y1="12" x2="21" y2="12" />
            <line x1="3" y1="18" x2="21" y2="18" />
          </svg>
          Menu
        </button>
      </div>
    </header>

    <div
      class="modal-overlay"
      id="navModal"
      role="dialog"
      aria-modal="true"
      aria-labelledby="navModalTitle"
    >
      <div class="modal-box nav-modal-box">
        <div class="modal-header">
          <span class="modal-title" id="navModalTitle">Navigation</span>
          <button
            type="button"
            class="modal-close"
            id="navModalClose"
            aria-label="Close menu"
          >
            ✕
          </button>
        </div>

        <ul class="nav-links">
          <li>
            <a href="index.html">
              <svg viewBox="0 0 24 24">
                <rect x="3" y="3" width="7" height="7" rx="1" />
                <rect x="14" y="3" width="7" height="7" rx="1" />
                <rect x="3" y="14" width="7" height="7" rx="1" />
                <rect x="14" y="14" width="7" height="7" rx="1" />
              </svg>
              Dashboard
            </a>
          </li>
          <li>
            <a href="alerts.html" class="active">
              <svg viewBox="0 0 24 24">
                <path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9" />
                <path d="M13.73 21a2 2 0 01-3.46 0" />
              </svg>
              Alerts
            </a>
          </li>
          <li>
            <a href="monitoring.html">
              <svg viewBox="0 0 24 24">
                <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7z" />
                <circle cx="12" cy="12" r="3" />
              </svg>
              Monitoring
            </a>
          </li>
          <li>
            <a href="reports.html">
              <svg viewBox="0 0 24 24">
                <path
                  d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"
                />
                <polyline points="14 2 14 8 20 8" />
                <line x1="16" y1="13" x2="8" y2="13" />
                <line x1="16" y1="17" x2="8" y2="17" />
                <polyline points="10 9 9 9 8 9" />
              </svg>
              Reports
            </a>
          </li>
          <li>
            <a href="medicine.html">
              <svg viewBox="0 0 24 24">
                <path d="M19 9h-2V7a7 7 0 10-14 0v2H1v13h18V9z" />
                <line x1="10" y1="13" x2="10" y2="17" />
                <line x1="8" y1="15" x2="12" y2="15" /></svg
              >Medications</a
            >
          </li>
        </ul>

        <div class="nav-modal-divider"></div>

        <div class="nav-modal-footer">
          <button type="button" class="btn-logout" data-action="logout">
            <svg viewBox="0 0 24 24">
              <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4" />
              <polyline points="16 17 21 12 16 7" />
              <line x1="21" y1="12" x2="9" y2="12" />
            </svg>
            Logout
          </button>
        </div>
      </div>
    </div>

    <main>
      <div class="hero-banner">
        <div class="hero-inner">
          <div class="hero-text">
            <div class="eyebrow"><span></span> Live feed</div>
            <h1>Alert Management</h1>
            <p>
              Review fall, SOS, security, and inactivity alerts as they arrive
              in real time.
            </p>
          </div>
          <div class="hero-stat-row">
            <div class="hero-stat">
              <div class="hero-stat-number" id="alertsStatTotal">0</div>
              <div class="hero-stat-label">Total</div>
            </div>
            <div class="hero-stat">
              <div class="hero-stat-number is-critical" id="alertsStatCritical">
                0
              </div>
              <div class="hero-stat-label">Critical</div>
            </div>
            <!-- Resolved stat removed per UI update -->
          </div>
        </div>
      </div>

      <div class="filter-bar">
        <div class="filter-tabs" id="alertsFilterTabs">
          <button type="button" class="filter-tab active" data-filter="all">
            All <span class="tab-count" id="countAll">0</span>
          </button>
          <button type="button" class="filter-tab" data-filter="critical">
            Critical <span class="tab-count" id="countCritical">0</span>
          </button>
          <button type="button" class="filter-tab" data-filter="warning">
            Warning <span class="tab-count" id="countWarning">0</span>
          </button>
          <button type="button" class="filter-tab" data-filter="info">
            Info <span class="tab-count" id="countInfo">0</span>
          </button>
          <!-- Resolved filter removed per UI update -->
        </div>
        <div class="filter-actions">
          <button type="button" class="btn-sm" id="alertsRefreshButton">
            <svg viewBox="0 0 24 24">
              <polyline points="23 4 23 10 17 10" />
              <polyline points="1 20 1 14 7 14" />
              <path
                d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"
              />
            </svg>
            Refresh
          </button>
        </div>
      </div>

      <div class="alerts-container" id="alertsFeed"></div>
    </main>

    <script>
      window.BACKEND_URL = "http://localhost:5000";
    </script>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script src="assets/js/api.js"></script>
    <script src="assets/js/socket.js"></script>
    <script src="assets/js/medication-reminder.js"></script>
    <script src="assets/js/alerts.js"></script>
  </body>
</html>
