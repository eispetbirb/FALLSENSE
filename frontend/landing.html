<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FallSense – Elderly Monitor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Fraunces:wght@700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/landing.css" />
</head>
<body>

  <!-- NAV -->
  <nav>
    <a class="brand" href="landing.html">
      <img class="brand-logo" src="caregiver/assets/logo.png" alt="FallSense – Elderly Monitor" />

    <div class="nav-actions">
      <a href="caregiver/login.html" class="btn btn-outline">Login</a>
      <a href="caregiver/register.html" class="btn btn-solid">Sign up</a>
    </div>
  </nav>

  <!-- HERO -->
  <section class="hero">
    <div class="hero-content-area">
      <div class="hero-bg"></div>

      <!-- Text Content -->
      <div class="hero-text">
        <div class="hero-eyebrow">
          <span class="hero-eyebrow-dot"></span>
          AI-Powered Elderly Monitor

        <h1>Smart Care,<br/><span>Safe Living</span></h1>

        <p class="hero-sub">

        </p>

        <div class="hero-cta">
          <a href="caregiver/register.html" class="btn btn-cta">Get Started</a>
        </div>
      </div>
    </div>

    <!-- Teal bottom band -->
    <div class="bottom-band">
      <div class="stat-item">
        <div class="stat-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
        </div>
        <div class="stat-label">Live Fall Detection</div>
      </div>
      <div class="stat-divider"></div>
      <div class="stat-item">
        <div class="stat-icon" aria-hidden="true">

      <div class="stat-divider"></div>

        <div class="stat-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>

        <div class="stat-label">Caregiver Dashboard</div>
      </div>
      <div class="stat-divider"></div>
      <div class="stat-item">
        <div class="stat-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><line x1="10" y1="9" x2="8" y2="9"/></svg>

    </div>
